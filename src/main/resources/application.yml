server:
  port: 8080

spring:
  application:
    name: aws-bedrock-poc

# ─────────────────────────────────────────────────────────────
# AWS Bedrock Configuration
# ─────────────────────────────────────────────────────────────
aws:
  region: ${AWS_REGION:us-east-1}   # override with AWS_REGION env var, default us-east-1

  # Credentials are read from environment variables set in .vscode/launch.json
  # (local dev) or injected by the runtime environment (EC2 / ECS / Lambda).
  # Never hard-code keys here — this file is committed to source control.
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

  bedrock:
    # Model ID to use for chat.  Change to any Bedrock-supported model.
    #
    # Amazon Nova (current generation — no Anthropic use-case form required):
    #   amazon.nova-micro-v1:0   — fastest, text-only
    #   amazon.nova-lite-v1:0   — balanced speed/quality  ← default
    #   amazon.nova-pro-v1:0    — highest quality
    #
    # Anthropic Claude (requires Anthropic use-case form in AWS Console):
    #   us.anthropic.claude-3-7-sonnet-20250219-v1:0
    #   us.anthropic.claude-3-5-haiku-20241022-v1:0
    model-id: amazon.nova-lite-v1:0

    # Maximum tokens the model may return per response
    max-tokens: 2048

    # Temperature controls creativity (0.0 = deterministic, 1.0 = creative)
    temperature: 0.7

    # How many previous messages to carry in a conversation (0 = stateless)
    max-conversation-turns: 10

    # ── Embedding settings ────────────────────────────────────────
    embedding:
      # Titan Embed Text V2 — no Anthropic form required.
      # Supports dimensions: 256 (compact), 512 (balanced), 1024 (richest)
      model-id: amazon.titan-embed-text-v2:0
      dimensions: 1024
      normalize: true   # L2-normalise vectors — enables dot-product as cosine similarity

    # ── Managed Knowledge Base (Bedrock Knowledge Bases) ─────────
    knowledge-base:
      # The Knowledge Base ID shown in AWS Console → Bedrock → Knowledge Bases.
      # Set via KB_ID env var in .vscode/launch.json for local dev.
      id: ${KB_ID:}

      # Generation model used for the RetrieveAndGenerate call.
      # Must be enabled in your account's Bedrock model access.
      model-id: amazon.nova-lite-v1:0

      # Max chunks returned per retrieve call (1-100).
      # Higher values give the model more context but cost more tokens.
      default-top-k: 5

# ─────────────────────────────────────────────────────────────
# Actuator — expose /actuator/health for readiness checks
# ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.bedrock: DEBUG
    software.amazon.awssdk: WARN
